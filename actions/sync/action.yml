name: 'Mordn — Sync knowledge base'
description: >-
  Trigger a re-index of your Mordn docs assistant AFTER a docs deploy has gone
  live. POSTs the docs-CI webhook (POST /v1/knowledge/sync) and, with wait:true,
  polls each ingestion job to completion so a failed re-sync turns the workflow
  red. Run this only once the new content is actually served at the public URL —
  see docs/keep-your-index-fresh.md for deployment-gated trigger patterns.
author: 'Mordn'
branding:
  icon: 'refresh-cw'
  color: 'purple'

inputs:
  api-key:
    description: >-
      Mordn API key for the docs agent. Prefer a least-privilege `sync`-scoped
      key once your chat-api deployment supports it (chat-api PR #17); it can
      only trigger re-indexing. Otherwise use a tenant key (mck_live_… /
      mck_test_…) with write scope — a full-write credential, so scope it to the
      one agent and treat it accordingly. Do NOT mint a `sync`-scoped key before
      chat-api PR #17 is deployed: older servers treat an unknown scope as
      read/write. Store it as an encrypted secret and pass it via `secrets` —
      NEVER hardcode it. It is sent only as the `Authorization: Bearer` header
      and is never printed.
    required: true
  api-base:
    description: >-
      Base URL of the Mordn API. Defaults to the hosted service; override for
      self-hosted / local deployments. No trailing slash needed.
    required: false
    default: 'https://api.mordn.com'
  source-ids:
    description: >-
      Optional comma-separated source ids (e.g. `src_abc,src_def`) to re-sync
      just those sources. Omit to re-sync every re-fetchable web source for the
      key's agent.
    required: false
    default: ''
  wait:
    description: >-
      When "true", poll every returned job id until it finishes and fail the
      step if any job errors (or the timeout is hit). Every requested syncable
      source contributes a job id whose terminal success guarantees the content
      as-of-trigger-time is indexed, so waiting on the returned ids also covers a
      coalesced rerun (an overlapping deploy is queued behind the active sync,
      never dropped). When "false" (default), fire the webhook and return the job
      ids without waiting.
    required: false
    default: 'false'
  timeout-seconds:
    description: >-
      Maximum seconds to wait for ALL jobs to finish when wait is "true". This
      budget spans BOTH the queue wait and the run: a coalesced rerun can sit
      `queued` behind an in-flight sync before it starts, so size this for
      queue + run, not run alone. A job still queued/running when the budget is
      hit is reported as ⏱️ pending (distinct from ❌ error) and the step exits
      non-zero. Ignored when wait is "false".
    required: false
    default: '600'

outputs:
  job-ids:
    description: 'Space-separated ingestion job ids that were kicked (may be empty if nothing was syncable).'
    value: ${{ steps.sync.outputs.job-ids }}

runs:
  using: 'composite'
  steps:
    - name: Trigger sync
      id: sync
      shell: bash
      env:
        # Passed via env (not the command line) so the key never appears in a
        # process listing or the run's echoed command. Referenced only inside the
        # curl header below.
        MORDN_API_KEY: ${{ inputs.api-key }}
        MORDN_API_BASE: ${{ inputs.api-base }}
        MORDN_SOURCE_IDS: ${{ inputs.source-ids }}
      run: |
        set -euo pipefail

        if [ -z "${MORDN_API_KEY}" ]; then
          echo "::error::api-key is required (pass a write-scoped tenant key via a secret)."
          exit 1
        fi

        # Strip any trailing slashes from the base so "${base}/v1/…" is clean.
        base="${MORDN_API_BASE%/}"
        if [ -z "${base}" ]; then
          echo "::error::api-base is empty. Provide the Mordn API base URL."
          exit 1
        fi

        # Build the request body. Empty source-ids -> {} (re-sync all web
        # sources). A CSV -> {"sourceIds":["src_a","src_b"]}. jq builds the JSON
        # so ids are safely quoted/escaped (never string-concatenated).
        if [ -n "${MORDN_SOURCE_IDS}" ]; then
          body="$(
            jq -cn --arg csv "${MORDN_SOURCE_IDS}" \
              '{sourceIds: ($csv | split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length > 0)))}'
          )"
        else
          body='{}'
        fi

        echo "POST ${base}/v1/knowledge/sync"
        # -sS: quiet but keep errors. Split body and status: write the response
        # body to a file, capture the HTTP code on stdout. The key is in the
        # header only. `|| true` keeps a curl transport failure (empty code)
        # from tripping `set -e` before we can print a clean message.
        resp_file="$(mktemp)"
        code="$(
          curl -sS -o "${resp_file}" -w '%{http_code}' \
            -X POST "${base}/v1/knowledge/sync" \
            -H "Authorization: Bearer ${MORDN_API_KEY}" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            --data "${body}" || true
        )"

        # Any non-2xx (or an empty code from a transport failure) is fatal. Print
        # the status + response body (which never contains the key) and fail.
        case "${code}" in
          2??) : ;;
          *)
            echo "::error::Sync request failed (HTTP ${code:-000})."
            echo "Response body:"
            cat "${resp_file}" || true
            echo
            rm -f "${resp_file}"
            exit 1
            ;;
        esac

        # Extract job ids. The API returns { "jobIds": [ ... ] }. jq -e fails if
        # the field is missing/not an array, so a malformed 2xx is caught too.
        if ! job_ids="$(jq -er '.jobIds | @tsv' "${resp_file}" 2>/dev/null)"; then
          echo "::error::Response did not contain a jobIds array."
          echo "Response body:"
          cat "${resp_file}" || true
          echo
          rm -f "${resp_file}"
          exit 1
        fi
        rm -f "${resp_file}"

        # @tsv gives tab-separated ids; normalise to a single space-separated
        # line for the output and for downstream iteration.
        job_ids="$(printf '%s' "${job_ids}" | tr '\t' ' ')"

        count=0
        if [ -n "${job_ids}" ]; then
          # shellcheck disable=SC2086
          set -- ${job_ids}
          count="$#"
        fi
        echo "Kicked ${count} sync job(s): ${job_ids:-<none>}"
        echo "job-ids=${job_ids}" >> "${GITHUB_OUTPUT}"

    - name: Wait for jobs
      if: ${{ inputs.wait == 'true' }}
      shell: bash
      env:
        MORDN_API_KEY: ${{ inputs.api-key }}
        MORDN_API_BASE: ${{ inputs.api-base }}
        MORDN_JOB_IDS: ${{ steps.sync.outputs.job-ids }}
        MORDN_TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
      run: |
        set -euo pipefail

        base="${MORDN_API_BASE%/}"
        job_ids="${MORDN_JOB_IDS:-}"

        summary="${GITHUB_STEP_SUMMARY:-/dev/null}"
        {
          echo "### Mordn knowledge sync"
          echo
          echo "| Job | Status | Progress | Stage |"
          echo "| --- | --- | --- | --- |"
        } >> "${summary}"

        if [ -z "${job_ids}" ]; then
          echo "No jobs were kicked (nothing syncable) — nothing to wait for."
          echo "| _(none)_ | — | — | No re-fetchable sources were kicked. |" >> "${summary}"
          exit 0
        fi

        # Validate the timeout is a positive integer; fall back to 300 otherwise.
        case "${MORDN_TIMEOUT_SECONDS}" in
          ''|*[!0-9]*) timeout_s=300 ;;
          *) timeout_s="${MORDN_TIMEOUT_SECONDS}" ;;
        esac
        [ "${timeout_s}" -gt 0 ] 2>/dev/null || timeout_s=300

        deadline=$(( $(date +%s) + timeout_s ))
        poll_interval=5

        # shellcheck disable=SC2086
        set -- ${job_ids}
        total_jobs="$#"

        failed=0
        # Track which jobs are still pending via a space-padded list we trim as
        # each one settles. Quote-safe: ids are opaque tokens, never eval'd.
        pending=" ${job_ids} "

        # Remember the LAST status seen for each still-pending job so that, if we
        # hit the timeout, we can report a job still `queued` (e.g. a coalesced
        # rerun waiting behind an in-flight sync) distinctly from one still
        # `running`. Stored in a temp dir, one file per job. Job ids are opaque
        # `[A-Za-z0-9_-]` tokens; we sanitise defensively so the id can never
        # escape the state dir as a path.
        state_dir="$(mktemp -d)"
        trap 'rm -rf "${state_dir}"' EXIT
        last_status_file() {
          printf '%s/%s' "${state_dir}" "$(printf '%s' "$1" | tr -c 'A-Za-z0-9_.-' '_')"
        }
        for jid in ${pending}; do
          printf 'pending' > "$(last_status_file "${jid}")"
        done

        # Poll at least once, then loop while jobs remain AND time is left. The
        # timeout is evaluated AFTER each poll pass (not before it), and the sleep
        # is capped to the time remaining — so a job that settles during the final
        # wait is still observed on a last poll instead of being misreported as a
        # timeout.
        while : ; do
          still_pending=""
          for jid in ${pending}; do
            resp_file="$(mktemp)"
            code="$(
              curl -sS -o "${resp_file}" -w '%{http_code}' \
                "${base}/v1/knowledge/jobs/${jid}" \
                -H "Authorization: Bearer ${MORDN_API_KEY}" \
                -H 'Accept: application/json' || true
            )"

            # A transient non-2xx (e.g. a brief 5xx, or a 404 before the job row
            # is visible) shouldn't kill the run — keep the job pending and retry
            # until the deadline. Only a terminal job status settles it.
            case "${code}" in
              2??) : ;;
              *)
                echo "  - ${jid}: status check returned HTTP ${code:-000}, retrying"
                rm -f "${resp_file}"
                still_pending="${still_pending} ${jid}"
                continue
                ;;
            esac

            status="$(jq -r '.status // "unknown"' "${resp_file}" 2>/dev/null || echo unknown)"
            done_n="$(jq -r '.progress.done // 0' "${resp_file}" 2>/dev/null || echo 0)"
            total_n="$(jq -r '.progress.total // 0' "${resp_file}" 2>/dev/null || echo 0)"
            stage="$(jq -r '.progress.stage // ""' "${resp_file}" 2>/dev/null || echo '')"
            err_msg="$(jq -r '.error // ""' "${resp_file}" 2>/dev/null || echo '')"
            rm -f "${resp_file}"

            case "${status}" in
              done)
                echo "  - ${jid}: done (${done_n}/${total_n})"
                echo "| \`${jid}\` | ✅ done | ${done_n}/${total_n} | ${stage:-completed} |" >> "${summary}"
                ;;
              error)
                echo "::error::Job ${jid} failed: ${err_msg:-unknown error}"
                echo "| \`${jid}\` | ❌ error | ${done_n}/${total_n} | ${err_msg:-unknown error} |" >> "${summary}"
                failed=1
                ;;
              queued|running)
                printf '%s' "${status}" > "$(last_status_file "${jid}")"
                still_pending="${still_pending} ${jid}"
                ;;
              *)
                # Unknown/unexpected status — keep polling; it will either settle
                # or be reported as pending at the timeout.
                still_pending="${still_pending} ${jid}"
                ;;
            esac
          done

          pending="${still_pending}"

          # All settled — done.
          [ -n "$(printf '%s' "${pending}" | tr -d ' ')" ] || break

          # Jobs remain: if we're out of time, report each still-pending job by
          # its LAST observed status. A `queued` job is almost always a coalesced
          # rerun that hadn't started yet — pending, not failed — so it gets a
          # ⏱️ pending row distinct from a ❌ error. The step still exits non-zero
          # (freshness wasn't confirmed within the budget); raise timeout-seconds,
          # which spans queue + run.
          now="$(date +%s)"
          if [ "${now}" -ge "${deadline}" ]; then
            echo "::error::Timed out after ${timeout_s}s: ${total_jobs} job(s) requested; some are still pending (this budget covers queue + run — a coalesced rerun can sit queued behind an in-flight sync)."
            for jid in ${pending}; do
              last="$(cat "$(last_status_file "${jid}")" 2>/dev/null || echo pending)"
              case "${last}" in
                queued)
                  echo "  - ${jid}: still queued at timeout (likely a coalesced rerun waiting behind an active sync — raise timeout-seconds)"
                  echo "| \`${jid}\` | ⏱️ pending (queued) | — | Still queued after ${timeout_s}s (queue + run). Likely a coalesced rerun; raise timeout-seconds. |" >> "${summary}"
                  ;;
                running)
                  echo "  - ${jid}: still running at timeout (raise timeout-seconds)"
                  echo "| \`${jid}\` | ⏱️ pending (running) | — | Still running after ${timeout_s}s (queue + run). Raise timeout-seconds. |" >> "${summary}"
                  ;;
                *)
                  echo "  - ${jid}: still pending at timeout"
                  echo "| \`${jid}\` | ⏱️ pending | — | Did not finish within ${timeout_s}s (queue + run). Raise timeout-seconds. |" >> "${summary}"
                  ;;
              esac
            done
            failed=1
            break
          fi

          # Time remains: sleep, but never past the deadline, then poll again.
          remaining=$(( deadline - now ))
          if [ "${remaining}" -lt "${poll_interval}" ]; then
            sleep "${remaining}"
          else
            sleep "${poll_interval}"
          fi
        done

        if [ "${failed}" -ne 0 ]; then
          echo "::error::One or more sync jobs did not complete successfully (errored or still pending at timeout)."
          exit 1
        fi
        echo "All ${total_jobs} sync job(s) completed successfully."
